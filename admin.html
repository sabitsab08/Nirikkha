<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nirikkha — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="CSS/admin-style.css"/>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="tb-btn tb-btn-ham" id="ham" onclick="toggleSidebar()">
        <span class="ms">menu</span>
      </button>
      <div class="logo-mark">
        <span class="ms">school</span>
      </div>
      <span class="logo-name">Nirikkha</span>
    </div>

    <div class="topbar-center">
      <div class="search-wrap">
        <span class="ms">search</span>
        <input type="text" placeholder="Search..."/>
      </div>
    </div>

    <div class="topbar-right">
      <button class="tb-btn" onclick="toggleTheme()">
        <span class="ms" id="theme-ic">dark_mode</span>
      </button>
      <div class="avatar">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvx9xYpV0dFFOzsPh3b9l5c4bmDkvXqbiL22O14pZNDSEgBpZG8Z5JaGe2fRxUMphBIINcikgjRcjo5orhWwuRw3NIVTDXZkYXTLKj5iVlulNM-UcJEwIoU4IjKUfWZ7rw41sTHOHNuXRTzacZWpoxcWkZQ2egHcrpaTQ0Hm8PsSLKNQVuFYzSKdg6GoVI_w4OG97vnZgvLY90J9-iGwK9Rs0kU2NiDC8D9Ig3bB6f_OtFbXmuT08fkLLBgEJYZgGMobbq9KaJG40" alt="Admin"/>
      </div>
    </div>
  </header>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-profile">
      <div class="sb-avatar">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvx9xYpV0dFFOzsPh3b9l5c4bmDkvXqbiL22O14pZNDSEgBpZG8Z5JaGe2fRxUMphBIINcikgjRcjo5orhWwuRw3NIVTDXZkYXTLKj5iVlulNM-UcJEwIoU4IjKUfWZ7rw41sTHOHNuXRTzacZWpoxcWkZQ2egHcrpaTQ0Hm8PsSLKNQVuFYzSKdg6GoVI_w4OG97vnZgvLY90J9-iGwK9Rs0kU2NiDC8D9Ig3bB6f_OtFbXmuT08fkLLBgEJYZgGMobbq9KaJG40" alt="Admin"/>
      </div>
      <div>
        <div class="sb-name">Admin</div>
        <div class="sb-role">System Administrator</div>
      </div>
    </div>

    <div class="nav-section">Main</div>

    <button class="nav-item active" onclick="setNav(this); closeSidebar();">
      <span class="ms">dashboard</span>Dashboard
    </button>

    <div class="nav-section nav-section-gap">Management</div>

    <button class="nav-item" onclick="setNav(this); closeSidebar();">
      <span class="ms">menu_book</span>Syllabus
    </button>
    <button class="nav-item" onclick="setNav(this); closeSidebar();">
      <span class="ms">manage_accounts</span>Roles
    </button>
    <button class="nav-item" onclick="setNav(this); closeSidebar();">
      <span class="ms">group_add</span>Add student
    </button>
    <button class="nav-item" onclick="setNav(this); closeSidebar();">
      <span class="ms">person_add</span>Add teacher
    </button>

    <div class="nav-spacer"></div>

    <div class="sidebar-footer">
      <button class="nav-item" onclick="closeSidebar();">
        <span class="ms">help_outline</span>Support
      </button>
      <button class="nav-item logout" onclick="closeSidebar();">
        <span class="ms">logout</span>Logout
      </button>
    </div>

  </aside>

  <!-- LAYOUT -->
  <div class="layout">
    <main class="main">

      <!-- Page header -->
      <div class="page-header">
        <div>
          <div class="greeting">Welcome back, Admin</div>
          <div class="date-str" id="datestr"></div>
        </div>
        <div class="role-badge">
          <span class="ms">admin_panel_settings</span>
          <span>Admin panel</span>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-row">
        <div class="stat-tile">
          <div class="stat-icon icon-blue">
            <span class="ms">group</span>
          </div>
          <div>
            <div class="stat-val">1,248</div>
            <div class="stat-lbl">Students</div>
          </div>
        </div>
        <div class="stat-tile">
          <div class="stat-icon icon-yellow">
            <span class="ms">badge</span>
          </div>
          <div>
            <div class="stat-val">84</div>
            <div class="stat-lbl">Teachers</div>
          </div>
        </div>
        <div class="stat-tile">
          <div class="stat-icon icon-green">
            <span class="ms">menu_book</span>
          </div>
          <div>
            <div class="stat-val">36</div>
            <div class="stat-lbl">Syllabuses</div>
          </div>
        </div>
        <div class="stat-tile">
          <div class="stat-icon icon-purple">
            <span class="ms">security</span>
          </div>
          <div>
            <div class="stat-val">5</div>
            <div class="stat-lbl">User roles</div>
          </div>
        </div>
      </div>

      <!-- Manage shortcuts -->
      <div class="section-lbl">Manage</div>
      <div class="menu-grid">
        <button class="menu-tile">
          <div class="tile-icon icon-green">
            <span class="ms">menu_book</span>
          </div>
          <div>
            <div class="tile-name">Syllabus</div>
            <div class="tile-sub">Manage curriculum</div>
          </div>
        </button>
        <button class="menu-tile">
          <div class="tile-icon icon-purple">
            <span class="ms">manage_accounts</span>
          </div>
          <div>
            <div class="tile-name">Roles</div>
            <div class="tile-sub">Set permissions</div>
          </div>
        </button>
        <button class="menu-tile">
          <div class="tile-icon icon-blue">
            <span class="ms">group_add</span>
          </div>
          <div>
            <div class="tile-name">Add student</div>
            <div class="tile-sub">Enroll students</div>
          </div>
        </button>
        <button class="menu-tile">
          <div class="tile-icon icon-yellow">
            <span class="ms">person_add</span>
          </div>
          <div>
            <div class="tile-name">Add teacher</div>
            <div class="tile-sub">Register faculty</div>
          </div>
        </button>
      </div>

      <!-- Footer -->
      <div class="page-footer">
        Developed by <strong>নিপাতনে সিদ্ধ Softwares</strong>
      </div>

    </main>
  </div>

  <!-- BOTTOM NAV (mobile) -->
  <nav class="bottom-nav">
    <button class="bn-item active" onclick="setActive(this)">
      <span class="ms">dashboard</span>Home
    </button>
    <button class="bn-item" onclick="setActive(this)">
      <span class="ms">menu_book</span>Syllabus
    </button>
    <button class="bn-item" onclick="setActive(this)">
      <span class="ms">manage_accounts</span>Roles
    </button>
    <button class="bn-item" onclick="setActive(this)">
      <span class="ms">group_add</span>Students
    </button>
    <button class="bn-item" onclick="setActive(this)">
      <span class="ms">person_add</span>Teachers
    </button>
  </nav>

  <script src="js/admin-script.js"></script>
</body>
</html>
