<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nirikkha - Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="CSS/admin-style.css">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<nav class="topnav">
  <div class="topnav-inner">
    <div class="topnav-left">
      <button id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu"><span class="material-symbols-outlined">menu</span></button>
      <span class="brand-name">Nirikkha</span>
      <div class="search-bar">
        <span class="material-symbols-outlined" style="font-size:0.875rem;color:#64748b">search</span>
        <input placeholder="Search settings..." type="text"/>
      </div>
    </div>
    <div class="topnav-right">
      <button class="icon-btn"><span class="material-symbols-outlined">notifications</span></button>
      <button class="settings-btn"><span class="material-symbols-outlined">settings</span></button>
      <div class="avatar"><img alt="Admin" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvx9xYpV0dFFOzsPh3b9l5c4bmDkvXqbiL22O14pZNDSEgBpZG8Z5JaGe2fRxUMphBIINcikgjRcjo5orhWwuRw3NIVTDXZkYXTLKj5iVlulNM-UcJEwIoU4IjKUfWZ7rw41sTHOHNuXRTzacZWpoxcWkZQ2egHcrpaTQ0Hm8PsSLKNQVuFYzSKdg6GoVI_w4OG97vnZgvLY90J9-iGwK9Rs0kU2NiDC8D9Ig3bB6f_OtFbXmuT08fkLLBgEJYZgGMobbq9KaJG40"/></div>
    </div>
  </div>
  <div class="topnav-divider"></div>
</nav>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<aside id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon"><span class="material-symbols-outlined">school</span></div>
    <div><h2 class="sidebar-brand-title">Admin Panel</h2><p class="sidebar-brand-sub">System Control</p></div>
  </div>
  <nav class="sidebar-nav" id="main-nav">
    <button class="nav-link" data-section="syllabus-management" onclick="navigate('syllabus-management')">
      <span class="material-symbols-outlined">menu_book</span><span>Syllabus Management</span>
    </button>
    <button class="nav-link" data-section="user-role" onclick="navigate('user-role')">
      <span class="material-symbols-outlined">group</span><span>User Roles</span>
    </button>
    <button class="nav-link" data-section="add-teacher" onclick="navigate('add-teacher')">
      <span class="material-symbols-outlined">person_add</span><span>Add Teacher</span>
    </button>
    <button class="nav-link" data-section="add-student" onclick="navigate('add-student')">
      <span class="material-symbols-outlined">group_add</span><span>Add Student</span>
    </button>
  </nav>
  <div class="sidebar-footer">
    <a href="#"><span class="material-symbols-outlined">help</span><span>Support</span></a>
    <a class="logout" href="#"><span class="material-symbols-outlined">logout</span><span>Logout</span></a>
  </div>
</aside>

<main id="main-content">
  <iframe id="page-frame" src="add-student.html" title="Page Content"></iframe>
</main>

<nav id="bottom-nav" style="align-items:center;justify-content:space-around">
  <button class="bottom-nav-item" data-section="syllabus-management" onclick="navigate('syllabus-management')">
    <span class="material-symbols-outlined">menu_book</span><span>Syllabus</span>
  </button>
  <button class="bottom-nav-item" data-section="user-role" onclick="navigate('user-role')">
    <span class="material-symbols-outlined">group</span><span>Roles</span>
  </button>
  <button class="bottom-nav-item" data-section="add-teacher" onclick="navigate('add-teacher')">
    <span class="material-symbols-outlined">person_add</span><span>Teacher</span>
  </button>
  <button class="bottom-nav-item active" data-section="add-student" onclick="navigate('add-student')">
    <span class="material-symbols-outlined">group_add</span><span>Student</span>
  </button>
</nav>

<script>
const PAGES = {
  'syllabus-management': 'syllabus-management.html',
  'user-role':           'user-role.html',
  'add-teacher':         'add-teacher.html',
  'add-student':         'add-student.html',
};

let currentSection = 'add-student';

function navigate(section) {
  if (!PAGES[section]) return;
  currentSection = section;
  document.getElementById('page-frame').src = PAGES[section];
  updateActiveLinks(section);
  closeSidebar();
  // update URL hash without reload
  history.replaceState(null, '', '#' + section);
}

function updateActiveLinks(section) {
  document.querySelectorAll('.nav-link, .bottom-nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-section') === section);
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// Handle hash on load
window.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#', '');
  const initial = PAGES[hash] ? hash : 'add-student';
  navigate(initial);
});

// Auto-resize iframe to content height
const frame = document.getElementById('page-frame');
frame.addEventListener('load', () => {
  try {
    const h = frame.contentDocument.body.scrollHeight;
    frame.style.height = Math.max(h, window.innerHeight - 64) + 'px';
  } catch(e) {}
});

// Global toast accessible from iframes
window.showToast = function(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const ic = type==='success' ? 'check_circle' : type==='error' ? 'error' : 'info';
  t.innerHTML = `<span class="material-symbols-outlined">${ic}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation = 'slideOut 0.3s ease'; setTimeout(() => t.remove(), 300); }, 3500);
};
</script>
</body>
</html>
